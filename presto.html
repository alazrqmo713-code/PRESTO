<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هدف الجامعة - 1200 دينار</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#1e293b;
    border-radius:20px;
    padding:25px;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
}

h1{
    text-align:center;
    margin-bottom:5px;
}

.goal{
    text-align:center;
    color:#94a3b8;
    margin-bottom:25px;
}

.info{
    background:#0f172a;
    padding:15px;
    border-radius:15px;
    margin-bottom:12px;
    font-size:20px;
}

progress{
    width:100%;
    height:28px;
    margin:15px 0;
}

.percent{
    text-align:center;
    margin-bottom:20px;
    color:#cbd5e1;
}

button{
    width:100%;
    border:none;
    padding:15px;
    font-size:18px;
    border-radius:12px;
    cursor:pointer;
    margin-top:10px;
}

.add{
    background:#22c55e;
    color:white;
}

.remove{
    background:#f59e0b;
    color:white;
}

.reset{
    background:#ef4444;
    color:white;
}

.done{
    text-align:center;
    margin-top:20px;
    font-size:22px;
    color:#22c55e;
}
</style>
</head>

<body>

<div class="card">

<h1>🎯 هدف الجامعة</h1>

<div class="goal">
الوصول إلى <b>1200 دينار</b>
</div>

<div class="info" id="days"></div>

<div class="info" id="money"></div>

<div class="info" id="remain"></div>

<progress id="bar" max="1200" value="0"></progress>

<div class="percent" id="percent"></div>

<button class="add" onclick="addDay()">
✅ أنجزت 3 طلبيات (+30)
</button>

<button class="remove" onclick="removeDay()">
↩️ تراجع يوم
</button>

<button class="reset" onclick="resetData()">
🗑️ تصفير البيانات
</button>

<div class="done" id="done"></div>

</div>

<script>

let days = Number(localStorage.getItem("days")) || 0;

function update(){

let total = days * 30;

if(total>1200)
total=1200;

let remain = 1200-total;

let percent = ((total/1200)*100).toFixed(1);

document.getElementById("days").innerHTML =
"📅 أيام العمل: <b>"+days+"</b>";

document.getElementById("money").innerHTML =
"💰 المجموع: <b>"+total+" دينار</b>";

document.getElementById("remain").innerHTML =
"📉 المتبقي: <b>"+remain+" دينار</b>";

document.getElementById("percent").innerHTML =
"نسبة الإنجاز: "+percent+"%";

document.getElementById("bar").value = total;

if(total>=1200){

document.getElementById("done").innerHTML =
"🎉 مبروك! وصلت لهدفك.";

}else{

let leftDays=Math.ceil(remain/30);

document.getElementById("done").innerHTML =
"باقي تقريبًا "+leftDays+" يوم عمل.";

}

localStorage.setItem("days",days);

}

function addDay(){

if(days*30<1200){

days++;

update();

}

}

function removeDay(){

if(days>0){

days--;

update();

}

}

function resetData(){

if(confirm("هل تريد تصفير جميع البيانات؟")){

days=0;

update();

}

}

update();

</script>

</body>
</html>
